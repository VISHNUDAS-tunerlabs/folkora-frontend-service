<style>
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes bird-glide {
            0% { transform: translate(-20vw, 0); opacity: 0; }
            15% { opacity: 0.8; }
            85% { opacity: 0.8; }
            100% { transform: translate(120vw, -10vh); opacity: 0; }
        }

        @keyframes subtle-wing {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.7); }
        }

        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Write-on Animation Core */
        @keyframes write-on {
            to { stroke-dashoffset: 0; }
        }

        @keyframes fill-text {
            to { fill: rgba(255, 255, 255, 1); }
        }

        .animate-fade-hi {
            opacity: 0;
            animation: fade-in-up 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            animation-delay: 1s;
        }

        /* Continuous Sequence Styles */
        .svg-text-welcome {
            font-family: 'Passions Conflict', cursive;
            font-size: 100px;
            fill: rgba(255, 255, 255, 0);
            stroke: #ffffff;
            stroke-width: 1px;
            /* Starts after 'Hi' fades in */
            animation: write-on 4s cubic-bezier(0.4, 0, 0.2, 1) forwards,
                       fill-text 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            animation-delay: 3s, 8.5s;
        }

        .svg-text-folkora {
            font-family: 'Plus Jakarta Sans';
            font-weight: 700;
            font-size: 48px;
            letter-spacing: -0.02em;
            fill: rgba(255, 255, 255, 0);
            stroke: #ffffff;
            stroke-width: 0.5px;
            /* Starts exactly when 'Welcome To' finishes (3s + 4s = 7s) */
            animation: write-on 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards,
                       fill-text 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            animation-delay: 7s, 8.5s;
        }

        /* Final content appears after everything is filled */
        .animate-fade-step-final {
            opacity: 0;
            animation: fade-in-up 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            animation-delay: 9.5s;
        }

        .bird-container {
            position: absolute;
            animation: bird-glide linear infinite;
            pointer-events: none;
            z-index: 5;
            will-change: transform, opacity;
        }

        .bird-svg {
            width: 32px;
            height: 24px;
            fill: #ffffff;
            animation: subtle-wing 2s ease-in-out infinite;
        }

        .celestial-body {
            position: absolute;
            left: 50%;
            transition: all 2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sky-gradient {
            background: linear-gradient(180deg, #1b1c1c 0%, #303030 100%);
            transition: background 2s ease;
        }

        .bloom-effect {
            box-shadow: 0 0 40px rgba(255, 157, 108, 0.2);
        }
    </style>

<body class="bg-background text-on-background font-body-md text-body-md overflow-hidden">

<script>
    // Bird Generation
    const birdLayer = document.getElementById('bird-layer');
    const birdCount = 6;
    const birdPath = "M2,12 C2,12 8,8 14,11 C20,14 26,10 30,12 C26,12 20,16 14,13 C8,10 2,12 2,12 Z";

    function generateBirds() {
        for (let i = 0; i < birdCount; i++) {
            const container = document.createElement('div');
            container.className = 'bird-container';
            const startY = 10 + Math.random() * 60;
            const delay = Math.random() * 25;
            const duration = 18 + Math.random() * 15; 
            const scale = 0.5 + Math.random() * 0.8;
            container.style.top = `${startY}%`;
            container.style.animationDelay = `-${delay}s`;
            container.style.animationDuration = `${duration}s`;
            container.style.transform = `scale(${scale})`;
            container.innerHTML = `
                <svg class="bird-svg" viewBox="0 0 32 24" style="animation-duration: ${2 + Math.random() * 2}s;">
                    <path d="${birdPath}" />
                </svg>
            `;
            birdLayer.appendChild(container);
        }
    }
    generateBirds();

    // Celestial Cycle Interaction
    let isDay = false; 
    const sun = document.getElementById('sun-element');
    const moon = document.getElementById('moon-element');
    const main = document.querySelector('main');

    function toggleCycle() {
        if (isDay) {
            sun.style.opacity = '0';
            sun.style.top = '80%';
            moon.style.opacity = '1';
            moon.style.top = '15%';
            main.style.background = 'linear-gradient(180deg, #0f1010 0%, #1b1c1c 100%)';
        } else {
            sun.style.opacity = '1';
            sun.style.top = '15%';
            moon.style.opacity = '0';
            moon.style.top = '80%';
            main.style.background = 'linear-gradient(180deg, #1b1c1c 0%, #303030 100%)';
        }
        isDay = !isDay;
    }

    setInterval(toggleCycle, 8000);

    // Initial Path Length Calculation for SVG Typography
    window.addEventListener('load', () => {
        const textElements = [
            document.getElementById('svg-welcome'),
            document.getElementById('svg-folkora')
        ];
        
        textElements.forEach(text => {
            if (text) {
                // Precise measurement for stroke-dasharray
                const length = text.getComputedTextLength() * 2.5; 
                text.style.strokeDasharray = length;
                text.style.strokeDashoffset = length;
            }
        });
    });
</script>
